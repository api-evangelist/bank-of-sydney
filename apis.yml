apis:
- aid: bank-of-sydney:bank-of-sydney-cdr-product-reference-data-api
  name: Bank of Sydney CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.banksyd.com.au/tools-support/open-banking/
  baseURL: https://openbank.api.banksyd.com.au/cds-au/v1/banking/products
  properties:
  - url: https://www.banksyd.com.au/tools-support/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-products
    type: APIReference
  - url: openapi/bank-of-sydney-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Product Reference Data (PRD) API exposing Bank
    of Sydney's retail and business banking product catalogue (home loans, deposits,
    everyday accounts) under the Consumer Data Right. Confirmed live at HTTP 200 (with
    request header x-v:4) returning a data.products array (29 products) conforming to
    the DSB Consumer Data Standards banking schema. Covers the Get Products and Get
    Product Detail endpoints (/banking/products and /banking/products/{productId}),
    both public and requiring no consumer authorisation.
- aid: bank-of-sydney:bank-of-sydney-cdr-accounts-balances-api
  name: Bank of Sydney CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.banksyd.com.au/tools-support/open-banking/
  baseURL: https://openbank.api.banksyd.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.banksyd.com.au/tools-support/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/bank-of-sydney-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorised account and balance data-sharing surface under the
    Consumer Data Right, delivered to Accredited Data Recipients (ADRs) under the CDR
    authorisation model (OAuth2/OIDC + PKCE, MTLS-secured). Covers Get Accounts
    (/banking/accounts), Get Bulk Balances (/banking/accounts/balances), Get Account
    Balance (/banking/accounts/{accountId}/balance) and Get Account Detail
    (/banking/accounts/{accountId}). Not public; the base endpoint returns HTTP 403
    without a valid CDR consumer authorisation. Conforms to the DSB Consumer Data
    Standards Banking API v1.36.0.
- aid: bank-of-sydney:bank-of-sydney-cdr-transactions-api
  name: Bank of Sydney CDR Transactions API
  tags:
  - CDR
  - Open Banking
  - Transactions
  - Banking
  - Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.banksyd.com.au/tools-support/open-banking/
  baseURL: https://openbank.api.banksyd.com.au/cds-au/v1/banking/accounts/{accountId}/transactions
  properties:
  - url: https://www.banksyd.com.au/tools-support/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/bank-of-sydney-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorised transaction data-sharing surface under the Consumer
    Data Right, delivered to Accredited Data Recipients (ADRs) under the CDR
    authorisation model (OAuth2/OIDC, MTLS-secured). Covers Get Transactions For
    Account (/banking/accounts/{accountId}/transactions) and Get Transaction Detail
    (/banking/accounts/{accountId}/transactions/{transactionId}), supporting
    filtering by date, amount and text. Not public; requires a valid CDR consumer
    authorisation. Conforms to the DSB Consumer Data Standards Banking API v1.36.0.
- aid: bank-of-sydney:bank-of-sydney-cdr-direct-debits-scheduled-payments-api
  name: Bank of Sydney CDR Direct Debits & Scheduled Payments API
  tags:
