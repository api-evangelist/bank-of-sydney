name: Bank of Sydney
kind: company
description: Bank of Sydney Ltd is an Australian authorised deposit-taking institution
  (ADI) headquartered in Sydney, New South Wales, offering personal and business banking,
  home loans, deposits, and everyday accounts. It is a wholly owned subsidiary of Lebanon-based
  Bank of Beirut and operates a national branch and digital footprint across Australia.
  As a regulated ADI, Bank of Sydney participates in Australia's Consumer Data Right
  (CDR) / Open Banking regime, exposing a public, unauthenticated Product Reference
  Data (PRD) API that conforms to the Data Standards Body (DSB) Consumer Data Standards.
  Consumer-facing account and transaction data sharing is delivered to Accredited Data
  Recipients (ADRs) under the CDR authorisation model, backed by OAuth2/OIDC.
