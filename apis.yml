  - Scheduled Payments
  - Banking
  - Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.banksyd.com.au/tools-support/open-banking/
  baseURL: https://openbank.api.banksyd.com.au/cds-au/v1/banking/accounts/direct-debits
  properties:
  - url: https://www.banksyd.com.au/tools-support/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/bank-of-sydney-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorised direct-debit and scheduled-payment data-sharing
    surface under the Consumer Data Right, delivered to Accredited Data Recipients
    (ADRs) under the CDR authorisation model (OAuth2/OIDC, MTLS-secured). Covers Get
    Direct Debits For Account, Get Bulk Direct Debits (/banking/accounts/direct-debits),
    Get Scheduled Payments For Account, Get Scheduled Payments Bulk
    (/banking/payments/scheduled) and the Get Payment Plans endpoints. Not public,
    requires a valid CDR consumer authorisation. Conforms to the DSB Consumer Data
    Standards Banking API v1.36.0.
- aid: bank-of-sydney:bank-of-sydney-cdr-payees-api
  name: Bank of Sydney CDR Payees API
  tags:
  - CDR
  - Open Banking
  - Payees
  - Banking
  - Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.banksyd.com.au/tools-support/open-banking/
  baseURL: https://openbank.api.banksyd.com.au/cds-au/v1/banking/payees
  properties:
  - url: https://www.banksyd.com.au/tools-support/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/bank-of-sydney-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorised saved-payee data-sharing surface under the Consumer
    Data Right, delivered to Accredited Data Recipients (ADRs) under the CDR
    authorisation model (OAuth2/OIDC, MTLS-secured). Covers Get Payees (/banking/payees)
    and Get Payee Detail (/banking/payees/{payeeId}), returning the consumer's stored
    domestic, biller and international payee records. Not public; requires a valid CDR
    consumer authorisation. Conforms to the DSB Consumer Data Standards Banking API
    v1.36.0.
